[project]
name = "omnikernal"
version = "0.1.0"
description = "Secure, database-driven, multi-platform bot automation engine — Microkernel Plugin Architecture"
requires-python = ">=3.12"
dependencies = [
    "loguru>=0.7.0",
    "cryptography>=42.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
